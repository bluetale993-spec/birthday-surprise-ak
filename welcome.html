<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Gift 🎁</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#060818,#1d1147,#5b1b8f);
overflow:hidden;
color:white;
}

.container{
text-align:center;
background:rgba(255,255,255,.1);
backdrop-filter:blur(18px);
padding:45px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,255,255,.2);
animation:fade 1.5s ease;
}

h1{
font-size:45px;
margin-bottom:20px;
}

p{
font-size:20px;
opacity:.9;
margin-bottom:30px;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday! 🎉</h1>

<p>
Welcome to your magical birthday surprise...
This is only the beginning. 💖
</p>

<button onclick="location.href='memories.html'">
✨ Continue
</button>

</div>

</body>
</html>
