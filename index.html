<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#090909,#1b1037,#4b1d72);
      overflow:hidden;
      color:white;
      text-align:center;
    }

    .box{
      background:rgba(255,255,255,.08);
      padding:35px;
      border-radius:25px;
      backdrop-filter:blur(15px);
      box-shadow:0 0 35px rgba(255,255,255,.15);
      animation:fade 2s ease;
      max-width:90%;
    }

    h1{
      font-size:40px;
      margin-bottom:15px;
    }

    p{
      font-size:18px;
      opacity:.9;
    }

    button{
      margin-top:30px;
      padding:15px 35px;
      border:none;
      border-radius:50px;
      background:#ff4fa3;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      transform:scale(1.05);
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

<div class="box">
<h1>🎂 Happy Birthday 🎂</h1>

<p>
A little surprise has been made just for you...
</p>

<button onclick="alert('The journey begins... ❤️')">
Open Your Gift 🎁
</button>

</div>

</body>
</html>
