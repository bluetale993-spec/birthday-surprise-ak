<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="Subramaniapuram_-_Kangal_irandal_(mp3.pm).mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>Happy Birthday ❤️</h1>

<p>A little surprise has been made just for you...</p>

<button id="giftBtn">🎁 Open Your Gift</button>

</div>

<script>
const music = document.getElementById("bgMusic");

document.getElementById("giftBtn").addEventListener("click", function () {
    music.play();
    window.location.href = "welcome.html";
});
</script>

</body>
</html>
