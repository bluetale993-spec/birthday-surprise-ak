<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="kangal-irandal.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>Happy Birthday ❤️</h1>

<p>A little surprise has been made just for you...</p>

<button id="giftBtn">🎁 Open Your Gift</button>

</div>

<script>
const music = document.getElementById("bgMusic");

document.getElementById("giftBtn").addEventListener("click", async function () {
    try {
        await music.play();
    } catch (e) {
        console.log(e);
    }

    setTimeout(() => {
        window.location.href = "welcome.html";
    }, 2000);
});
</script>

</body>
</html>
