<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Gallery ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff758c,#ff7eb3);
padding:30px;
color:white;
}

h1{
text-align:center;
margin-bottom:30px;
font-size:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.photo{
background:white;
color:#333;
padding:15px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.photo:hover{
transform:scale(1.05);
}

.photo img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.caption{
margin-top:10px;
font-weight:bold;
}

button{
display:block;
margin:40px auto;
padding:15px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff4f81;
font-size:18px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<h1>📸 Our Beautiful Memories ❤️</h1>

<div class="gallery">

<div class="photo">
<img src="https://via.placeholder.com/300x300?text=Photo+1">
<div class="caption">Our first favorite memory ❤️</div>
</div>

<div class="photo">
<img src="https://via.placeholder.com/300x300?text=Photo+2">
<div class="caption">Every smile with you is special ✨</div>
</div>

<div class="photo">
<img src="https://via.placeholder.com/300x300?text=Photo+3">
<div class="caption">A memory I'll always treasure 💕</div>
</div>

<div class="photo">
<img src="https://via.placeholder.com/300x300?text=Photo+4">
<div class="caption">Forever my favorite person ❤️</div>
</div>

</div>

<button onclick="location.href='letter.html'">
Open My Birthday Letter 💌
</button>

</body>
</html>
