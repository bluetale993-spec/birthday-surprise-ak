<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Surprise 🎁</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎁 One Last Surprise...</h1>

<div id="giftBox" style="font-size:100px;cursor:pointer;animation:float 2s ease-in-out infinite;">
🎁
</div>

<p id="hiddenMessage" style="display:none;font-size:22px;margin-top:20px;">
💖 Happy Birthday! 💖<br><br>

You deserve all the happiness, smiles, laughter and love in the world.
I hope this little website made your day a little more special. 🌸✨
</p>

<button id="finalBtn" style="display:none;" onclick="window.location.href='index.html'">
❤️ Back to Start
</button>

</div>

<script>
const gift = document.getElementById("giftBox");
const msg = document.getElementById("hiddenMessage");
const btn = document.getElementById("finalBtn");

gift.onclick = function(){
    gift.innerHTML = "🎊";
    msg.style.display = "block";
    btn.style.display = "inline-block";
}
</script>

</body>
</html>
